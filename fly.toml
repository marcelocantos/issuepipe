app = "issuepipe"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  LISTEN_ADDR = ":8080"
  DATA_DIR = "/data"
  BACKFILL_ON_START = "true"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_start_machines = true
  auto_stop_machines = "stop"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    path = "/health"

[mounts]
  source = "issuepipe_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
